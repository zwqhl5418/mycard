<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>张三 · 前端开发者</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, #0f0c29 0%, #1a1a3e 40%, #24243e 70%, #302b63 100%);
      color: #eaeaea;
      padding: 20px;
    }

    .card {
      width: 380px;
      max-width: 100%;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 24px;
      padding: 40px 32px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
      text-align: center;
      transition: transform 0.25s ease;
    }

    .card:hover {
      transform: translateY(-4px);
    }

    /* Avatar placeholder */
    .avatar {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      margin: 0 auto 20px;
      background: linear-gradient(135deg, #a855f7, #6366f1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      font-weight: 600;
      color: #fff;
      box-shadow: 0 8px 24px rgba(99, 102, 241, 0.35);
      user-select: none;
    }

    .name {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .title {
      display: inline-block;
      margin-top: 8px;
      padding: 4px 16px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 500;
      background: linear-gradient(135deg, rgba(168, 85, 247, 0.2), rgba(99, 102, 241, 0.2));
      border: 1px solid rgba(168, 85, 247, 0.25);
      color: #c4b5fd;
    }

    .divider {
      height: 1px;
      margin: 24px auto;
      width: 60px;
      background: linear-gradient(90deg, transparent, rgba(168, 85, 247, 0.5), transparent);
    }

    .bio {
      font-size: 14px;
      line-height: 1.7;
      color: #b0b0c8;
      margin-bottom: 24px;
    }

    .skills {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .skill-tag {
      padding: 6px 18px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.06);
      color: #d0d0e8;
      transition: all 0.2s ease;
    }

    .skill-tag:hover {
      background: rgba(168, 85, 247, 0.2);
      border-color: rgba(168, 85, 247, 0.4);
      color: #e0d0ff;
      transform: scale(1.05);
    }

    /* Subtle decorative glow */
    .card::before {
      content: "";
      position: absolute;
      top: -60px;
      right: -60px;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(168, 85, 247, 0.08), transparent 70%);
      pointer-events: none;
    }

    .card {
      position: relative;
      overflow: hidden;
    }

    .card::after {
      content: "";
      position: absolute;
      bottom: -60px;
      left: -60px;
      width: 160px;
      height: 160px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.07), transparent 70%);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar">张</div>

    <div class="name">张三</div>
    <div class="title">前端开发者</div>

    <div class="divider"></div>

    <p class="bio">
      热爱将设计转化为流畅的交互体验。专注于现代前端技术栈，
      持续探索优雅的代码与界面。相信好的产品始于对细节的执着。
    </p>

    <div class="skills">
      <span class="skill-tag">React</span>
      <span class="skill-tag">Python</span>
      <span class="skill-tag">设计</span>
    </div>
  </div>
</body>
</html>
